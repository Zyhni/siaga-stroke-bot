<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Login - SiagaStroke</title>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center">
  <form method="POST" action="/login" class="w-full max-w-sm bg-slate-900/70 border border-slate-800 rounded-2xl p-6 shadow">
    <h1 class="text-xl font-semibold mb-1">SiagaStroke Dashboard</h1>

    <label class="block text-sm mb-2">Username</label>
    <input name="username" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800 mb-4" required />

    <label class="block text-sm mb-2">Password</label>
    <input type="password" name="password" class="w-full px-3 py-2 rounded-xl bg-slate-950 border border-slate-800 mb-6" required />

    <button class="w-full py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 font-semibold">Login</button>
  </form>
</body>
</html>
